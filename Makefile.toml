[config]
default_to_workspace = false

[tasks.build]
description = "Build the WASM component"
command = "golem"
args = ["build"]

[tasks.check]
description = "Check all crates compile"
command = "cargo"
args = ["check", "--workspace"]

[tasks.test]
clear = true
description = "Run all integration tests (starts/stops Golem + Kafka, requires Docker)"
script_runner = "@shell"
script = '''
set -e
cleanup() {
    echo "Stopping Golem..."
    pkill -f "golem-server" 2>/dev/null || true
    pkill -f "golem server run" 2>/dev/null || true
    echo "Stopping Kafka..."
    docker compose -f test/integration-harness/docker/compose.yml down -v 2>/dev/null || true
    echo "Cleanup done."
}
trap cleanup EXIT

echo "==> Starting Golem server..."
pkill -f "golem-server" 2>/dev/null || true
pkill -f "golem server run" 2>/dev/null || true
sleep 1
golem server run --clean > /dev/null 2>&1 &
for i in $(seq 1 60); do
    nc -z 127.0.0.1 9881 2>/dev/null && break
    sleep 1
done
nc -z 127.0.0.1 9881 2>/dev/null || { echo "ERROR: Golem server did not start"; exit 1; }
echo "Golem server ready."

echo "==> Deploying component..."
golem deploy --yes

echo "==> Starting Kafka..."
docker compose -f test/integration-harness/docker/compose.yml up -d
for i in $(seq 1 30); do
    nc -z 127.0.0.1 9092 2>/dev/null && break
    sleep 1
done
nc -z 127.0.0.1 9092 2>/dev/null || { echo "ERROR: Kafka did not start"; exit 1; }
echo "Kafka ready."

echo "==> Running tests..."
cargo test -p integration-harness -- --nocapture --ignored --test-threads=1

echo "==> All tests passed!"
'''

[tasks.demo]
clear = true
description = "Run a CIRR demo with aggregation across 3 CDNs and open the dashboard"
script_runner = "@shell"
script = '''
set -e
cleanup() {
    echo ""
    echo "Stopping dashboard..."
    [ -n "$DASH_PID" ] && kill "$DASH_PID" 2>/dev/null || true
    echo "Stopping Golem..."
    pkill -f "golem-server" 2>/dev/null || true
    pkill -f "golem server run" 2>/dev/null || true
    echo "Stopping Kafka..."
    docker compose -f test/integration-harness/docker/compose.yml down -v 2>/dev/null || true
    echo "Cleanup done."
}
trap cleanup EXIT

echo "╔══════════════════════════════════════════════════════════════╗"
echo "║  CIRR Demo — Connection Induced Rebuffering Ratio          ║"
echo "║                                                            ║"
echo "║  duration_where(                                           ║"
echo "║    has_existed(playerStateChange == \"play\")                 ║"
echo "║    && !has_existed_within(playerStateChange == \"seek\", 5)   ║"
echo "║    && latest_event_to_state(playerStateChange) == \"buffer\"  ║"
echo "║  ) | aggregate(group_by(cdn), count, sum, avg)             ║"
echo "╚══════════════════════════════════════════════════════════════╝"
echo ""

# --- Start infrastructure ---
echo "==> Starting Golem server..."
pkill -f "golem-server" 2>/dev/null || true
pkill -f "golem server run" 2>/dev/null || true
sleep 1
golem server run --clean > /dev/null 2>&1 &
for i in $(seq 1 60); do
    nc -z 127.0.0.1 9881 2>/dev/null && break
    sleep 1
done
nc -z 127.0.0.1 9881 2>/dev/null || { echo "ERROR: Golem server did not start"; exit 1; }
echo "    Golem server ready."

echo "==> Building and deploying component..."
golem build
golem deploy --yes
echo "    Component deployed."

echo "==> Starting Kafka..."
docker compose -f test/integration-harness/docker/compose.yml up -d
for i in $(seq 1 30); do
    nc -z 127.0.0.1 9092 2>/dev/null && break
    sleep 1
done
nc -z 127.0.0.1 9092 2>/dev/null || { echo "ERROR: Kafka did not start"; exit 1; }
echo "    Kafka ready."

# --- Generate events into Kafka ---
echo ""
echo "==> Generating events into Kafka..."
KAFKA_TOPIC=timeline-events SESSION_COUNT=9 EVENTS_PER_SESSION=50 cargo run -p kafka-producer 2>/dev/null
echo "    Events published to Kafka topic 'timeline-events'."

# --- Start dashboard ---
echo ""
echo "==> Starting dashboard at http://localhost:3000 ..."
KAFKA_BROKER=localhost:9092 KAFKA_TOPIC=timeline-events cargo run -p dashboard &
DASH_PID=$!

# Wait for dashboard to start
sleep 3

echo ""
echo "════════════════════════════════════════════════════════════════"
echo "  Dashboard running at http://localhost:3000"
echo ""
echo "  1. Click the 'Deploy Metric' tab"
echo "  2. Enter a metric name (e.g., 'cirr') and the DSL expression"
echo "  3. Click 'Deploy Metric'"
echo "     → The feeder starts consuming from Kafka and feeding events"
echo "       to the Golem agents automatically"
echo "  4. Switch to 'Computation Progress' to see per-session results"
echo "  5. Switch to 'Live Dashboard' to see aggregation across CDNs"
echo ""
echo "  Press Ctrl+C to stop everything"
echo "════════════════════════════════════════════════════════════════"

wait $DASH_PID
'''
